name: Lint PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: true
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
            security
            migration
            hotfix
          scopes: |
            auth
            institution
            submission
            scheduling
            guardrail
            slot
            media
            ai
            notification
            validation
            audit
            email
            jwt
            security
            rls
            migration
            config
            ci
            deps
            docs
