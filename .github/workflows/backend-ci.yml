name: DASIGConnect Backend CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**' # Change this if your folder has a different name

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' 

    - name: Run Maven Tests
      run: |
        cd backend
        ./mvnw clean test
