services:
  - type: web
    name: dasigconnect-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # Database
      - key: DASIG_DATABASE_URL
        sync: false
      - key: DASIG_DATABASE_USER
        sync: false
      - key: DASIG_DATABASE_PASSWORD
        sync: false
      # Supabase
      - key: DASIG_SUPABASE_URL
        sync: false
      - key: DASIG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DASIG_SUPABASE_STORAGE_BUCKET
        sync: false
      # JWT
      - key: JWT_SECRET
        sync: false
      # Mail
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: MAIL_SMTP_AUTH
        sync: false
      - key: MAIL_SMTP_STARTTLS_ENABLE
        sync: false
      - key: MAIL_SMTP_STARTTLS_REQUIRED
        sync: false
      - key: MAIL_SMTP_SSL_TRUST
        sync: false
      - key: MAIL_SMTP_CONNECTION_TIMEOUT
        sync: false
      - key: MAIL_SMTP_TIMEOUT
        sync: false
      - key: MAIL_SMTP_WRITE_TIMEOUT
        sync: false
      - key: MAIL_SMTP_DEBUG
        sync: false
      - key: MAIL_SMTP_DEBUG_AUTH
        sync: false
      # App
      - key: APP_FRONTEND_BASE_URL
        value: https://dasigconnect.vercel.app
      - key: APP_GUARDRAILS_ENFORCED
        value: "true"
