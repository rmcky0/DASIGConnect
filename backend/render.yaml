services:
  - type: web
    name: dasigconnect-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        scope: build
        sync: false
      - key: DATABASE_USER
        scope: build
        sync: false
      - key: DATABASE_PASSWORD
        scope: build
        sync: false
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
